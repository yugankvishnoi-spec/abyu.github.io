<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyu Game - 99+ Original Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; }
      .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px 20px; text-align: center; border-bottom: 3px solid #00ff88; }
      .logo { font-size: 3rem; font-weight: 900; color: #00ff88; margin-bottom: 10px; }
      .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
      .stats { text-align: center; color: #00ffff; font-size: 1.3rem; margin: 20px 0; }
      .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin: 30px 0; }
      .game-card { background: #1a1a2e; border: 2px solid #00ff8844; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
      .game-card:hover { transform: translateY(-5px); border-color: #00ff88; box-shadow: 0 5px 20px #00ff8855; }
      .game-emoji { font-size: 3rem; margin-bottom: 10px; }
      .game-name { color: #00ffff; font-weight: bold; font-size: 1rem; }
      .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; }
      .modal.active { display: flex; }
      .game-window { width: 95%; height: 90%; max-width: 800px; background: #0a0a0a; border: 3px solid #00ff88; border-radius: 15px; position: relative; padding: 20px; overflow-y: auto; }
      .close-btn { position: absolute; top: 15px; right: 15px; background: #ff0080; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 10001; }
        canvas { border: 2px solid #00ffff; background: #000; display: block; margin: 20px auto; max-width: 100%; touch-action: none; }
      .controls { text-align: center; margin: 15px 0; }
      .btn { background: #00ff88; color: #000; border: none; padding: 12px 25px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 5px; }
      .score { font-size: 1.5rem; color: #ff00ff; text-align: center; margin: 10px 0; }
      .about { background: #1a1a2e; margin: 50px 20px; padding: 30px; border-radius: 15px; border: 2px solid #ff00ff; text-align: center; }
        input { padding: 10px; font-size: 1.2rem; width: 100px; text-align: center; background: #1a1a2e; color: #00ff88; border: 2px solid #00ff88; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ABYU GAME</div>
        <p>99+ Original Games | 100% Apna Code | Zero External Links</p>
    </div>

    <div class="container">
        <div class="stats">🎮 Total Games: <span id="totalGames">12</span> | More Coming Soon</div>
        <div class="games-grid" id="gamesList"></div>
    </div>

    <div class="about">
        <h2 style="color: #ff00ff; margin-bottom: 20px;">ABOUT US</h2>
        <p style="color: #00ffff; font-size: 1.2rem; margin: 8px 0;">Founder & Developer: Yugank Vishnoi</p>
        <p style="color: #00ffff; font-size: 1.2rem; margin: 8px 0;">Co-Founder: Abhinav Singh</p>
        <p style="color: #00ffff; font-size: 1.2rem; margin: 8px 0;">Investor: Akshat Sharma</p>
        <p style="margin-top: 20px; color: #888;">Made in India 🇮🇳 | All Games Original | No Ads Yet</p>
    </div>

    <div class="modal" id="gameModal">
        <div class="game-window">
            <button class="close-btn" onclick="closeGame()">×</button>
            <div id="gameContainer"></div>
        </div>
    </div>

    <script>
        const games = [
            {id: 1, name: "Abyu Snake", emoji: "🐍", type: "snake"},
            {id: 2, name: "Abyu Tic Tac Toe", emoji: "⭕", type: "tictactoe"},
            {id: 3, name: "Abyu Clicker", emoji: "👆", type: "clicker"},
            {id: 4, name: "Abyu Memory", emoji: "🧠", type: "memory"},
            {id: 5, name: "Abyu Guess Number", emoji: "🔢", type: "guess"},
            {id: 6, name: "Abyu Dodge Car", emoji: "🚗", type: "dodge"},
            {id: 7, name: "Abyu Color Match", emoji: "🎨", type: "color"},
            {id: 8, name: "Abyu Math Quiz", emoji: "➕", type: "math"},
            {id: 9, name: "Abyu Reaction Test", emoji: "⚡", type: "reaction"},
            {id: 10, name: "Abyu Rock Paper", emoji: "✂️", type: "rps"},
            {id: 11, name: "Abyu Flappy Bird", emoji: "🐦", type: "flappy"},
            {id: 12, name: "Abyu Breakout", emoji: "🧱", type: "breakout"}
        ];

        const grid = document.getElementById('gamesList');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<div class="game-emoji">${game.emoji}</div><div class="game-name">${game.name}</div>`;
            card.onclick = () => openGame(game.type);
            grid.appendChild(card);
        });

        let currentGame = null;

        function openGame(type) {
            document.getElementById('gameModal').classList.add('active');
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';
            if(type === 'snake') loadSnakeGame(container);
            else if(type === 'tictactoe') loadTicTacToe(container);
            else if(type === 'clicker') loadClickerGame(container);
            else if(type === 'memory') loadMemoryGame(container);
            else if(type === 'guess') loadGuessGame(container);
            else if(type === 'dodge') loadDodgeGame(container);
            else if(type === 'color') loadColorGame(container);
            else if(type === 'math') loadMathGame(container);
            else if(type === 'reaction') loadReactionGame(container);
            else if(type === 'rps') loadRPSGame(container);
            else if(type === 'flappy') loadFlappyGame(container);
            else if(type === 'breakout') loadBreakoutGame(container);
        }

        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            if(currentGame) clearInterval(currentGame);
        }

        function loadSnakeGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU SNAKE</h2><div class="score">Score: <span id="snakeScore">0</span></div><canvas id="snakeCanvas" width="400" height="400"></canvas><div class="controls"><button class="btn" onclick="startSnake()">START</button><p style="color:#888;margin-top:10px;">Swipe / Arrow Keys</p></div>`;
            window.startSnake = function() {
                const canvas = document.getElementById('snakeCanvas'), ctx = canvas.getContext('2d'), box = 20;
                let snake = [{x: 9*box, y: 10*box}], food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box}, d, score = 0, touchStartX, touchStartY;
                document.onkeydown = (e) => { if(e.keyCode==37&&d!="RIGHT")d="LEFT"; else if(e.keyCode==38&&d!="DOWN")d="UP"; else if(e.keyCode==39&&d!="LEFT")d="RIGHT"; else if(e.keyCode==40&&d!="UP")d="DOWN"; };
                canvas.ontouchstart = (e) => { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; };
                canvas.ontouchend = (e) => { let dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY; if(Math.abs(dx)>Math.abs(dy)){d=dx>0&&d!="LEFT"?"RIGHT":dx<0&&d!="RIGHT"?"LEFT":d;} else {d=dy>0&&d!="UP"?"DOWN":dy<0&&d!="DOWN"?"UP":d;}};
                function draw() {
                    ctx.fillStyle='#000'; ctx.fillRect(0,0,400,400);
                    for(let i=0;i<snake.length;i++){ ctx.fillStyle=i==0?'#00ff88':'#00ffff'; ctx.fillRect(snake[i].x,snake[i].y,box,box); }
                    ctx.fillStyle='#ff0080'; ctx.fillRect(food.x,food.y,box,box);
                    let snakeX=snake[0].x, snakeY=snake[0].y;
                    if(d=="LEFT")snakeX-=box; if(d=="UP")snakeY-=box; if(d=="RIGHT")snakeX+=box; if(d=="DOWN")snakeY+=box;
                    if(snakeX==food.x&&snakeY==food.y){ score++; document.getElementById('snakeScore').innerText=score; food={x:Math.floor(Math.random()*19+1)*box,y:Math.floor(Math.random()*19+1)*box}; } else snake.pop();
                    let newHead={x:snakeX,y:snakeY};
                    if(snakeX<0||snakeX>=400||snakeY<0||snakeY>=400||snake.some(s=>s.x==newHead.x&&s.y==newHead.y)){ clearInterval(currentGame); alert('Game Over! Score: '+score); return; }
                    snake.unshift(newHead);
                }
                clearInterval(currentGame); currentGame = setInterval(draw,100);
            };
