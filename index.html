<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyu Game - Apne Games</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            color: #00ff88;
            margin: 20px 0;
        }
       .game-box {
            background: #1a1a2e;
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #00ff88;
        }
        canvas {
            border: 2px solid #00ffff;
            background: #000;
            display: block;
            margin: 20px auto;
        }
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #00ffff;
        }
       .score {
            font-size: 2rem;
            color: #ff00ff;
            margin: 15px 0;
        }
       .about {
            background: #1a1a2e;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff00ff;
        }
       .name {
            color: #00ffff;
            font-size: 1.2rem;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <h1>ABYU GAME</h1>
    <p>100% Apne Games - Koi Dusre Ka Link Nahi</p>

    <div class="game-box">
        <h2 style="color: #00ffff;">ABYU SNAKE</h2>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="game" width="400" height="400"></canvas>
        <button onclick="startGame()">GAME START</button>
        <p style="color: #888; margin-top: 15px;">Arrow Keys se khel: ↑ ↓ ← →</p>
    </div>

    <div class="about">
        <h2 style="color: #ff00ff;">ABOUT US</h2>
        <div class="name">Founder & Developer: Yugank Vishnoi</div>
        <div class="name">Co-Founder: Abhinav Singh</div>
        <div class="name">Investor: Akshat Sharma</div>
        <p style="margin-top: 20px; color: #888;">Made in India 🇮🇳 | All Games Original</p>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let d;
        let score = 0;
        let game;

        document.addEventListener('keydown', direction);

        function direction(event) {
            if(event.keyCode == 37 && d!= "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d!= "DOWN") d = "UP";
            else if(event.keyCode == 39 && d!= "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d!= "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 400, 400);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0)? '#00ff88' : '#00ffff';
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = '#ff0080';
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById('score').innerText = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = {x: snakeX, y: snakeY};

            if(snakeX < 0 || snakeX >= 400 || snakeY < 0 || snakeY >= 400 || collision(newHead, snake)) {
                clearInterval(game);
                alert('Game Over! Score: ' + score);
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function startGame() {
            snake = [{x: 9 * box, y: 10 * box}];
            d = undefined;
            score = 0;
            document.getElementById('score').innerText = score;
            clearInterval(game);
            game = setInterval(draw, 100);
        }
    </script>
</body>
</html>
