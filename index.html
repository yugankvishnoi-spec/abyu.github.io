  log       letter-spacing: 1px;

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
           
        .stats {

            margin: 20px 0 40px 0;

        /* PREMIUM NEON GRID */
        .games-grid {

        .game-card {

        .game-emoji {

        .modal.active { display: flex; }
        .game-window { 
            width: 95%; 
            height: 90%; 
            max-width: 850px; 
            background: #0a0a15; 
            border: 3px solid #00ff88; 
            border-radius: 20px; 
            position: relative; 
            padding: 30px 20px; 
            overflow-y: auto; 
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.4);
        }
        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: #ff007f; 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            font-size: 1.8rem; 
            cursor: pointer; 
            z-index: 10001; 
            box-shadow: 0 0 15px #ff007f;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover {
            transform: scale(1.1);
            background: #ff3399;
        }
        canvas { 
            border: 3px solid #00ffff; 
            background: #000; 
            display: block; 
            margin: 20px auto; 
            max-width: 100%; 
            touch-action: none; 
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            border-radius: 10px;
        }
        .controls { text-align: center; margin: 20px 0; }
        .btn { 
            background: linear-gradient(135deg, #00ff88, #00ffff); 
            color: #000; 
            border: none; 
            padding: 14px 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin: 8px; 
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            transition: 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.7);
        }
        .score { font-size: 1.8rem; color: #ff00ff; text-align: center; margin: 15px 0; text-shadow: 0 0 10px #ff00ff; font-weight: bold;}
           
        /* ABOUT US SECTION WITH NEON BORDER */
        .about { 
            background: rgba(15, 15, 30, 0.8); 
            margin: 60px auto; 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid #ff00ff; 
            text-align: center; 
            max-width: 800px;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.05);
        }
        .about h2 {
            text-shadow: 0 0 12px #ff00ff;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        .about p {
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }
        input { padding: 12px; font-size: 1.3rem; width: 120px; text-align: center; background: #151525; color: #00ff88; border: 2px solid #00ff88; border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        input:focus { outline: none; box-shadow: 0 0 20px #00ff88; }

</head>
<body>
    <div class="header">
        <div class="logo">ABYU GAME</div>
        <p>12 Original Games | 100% Apna Code | Zero External Links</p>
    </div>
    <div class="container">
        <div class="stats">🎮 Total Games: <span id="totalGames">12</span></div>
        <div class="games-grid" id="gamesList"></div>
    </div>
    <div class="about">
        <h2 style="color: #ff00ff; margin-bottom: 25px;">ABOUT US</h2>
        <p style="color: #00ffff; font-size: 1.3rem; margin: 10px 0; font-weight: bold;">Founder & Developer: Yugank Vishnoi</p>
        <p style="color: #00ffff; font-size: 1.3rem; margin: 10px 0; font-weight: bold;">Co-Founder: Abhinav Singh</p>
        <p style="color: #00ffff; font-size: 1.3rem; margin: 10px 0; font-weight: bold;">Investor: Akshat Sharma</p>
        <p style="margin-top: 30px; color: #666; font-weight: bold; letter-spacing: 1px;">MADE IN INDIA 🇮🇳 | ALL GAMES ORIGINAL</p>
    </div>
    <div class="modal" id="gameModal">
        <div class="game-window">
            <button class="close-btn" onclick="closeGame()">×</button>
            <div id="gameContainer"></div>
        </div>
    </div>
    <script>
        const games = [
            {id: 1, name: "Abyu Snake", emoji: "🐍", type: "snake"},
            {id: 2, name: "Abyu Tic Tac Toe", emoji: "⭕", type: "tictactoe"},
            {id: 3, name: "Abyu Clicker", emoji: "👆", type: "clicker"},
            {id: 4, name: "Abyu Memory", emoji: "🧠", type: "memory"},
            {id: 5, name: "Abyu Guess Number", emoji: "🔢", type: "guess"},
            {id: 6, name: "Abyu Dodge Car", emoji: "🚗", type: "dodge"},
            {id: 7, name: "Abyu Color Match", emoji: "🎨", type: "color"},
            {id: 8, name: "Abyu Math Quiz", emoji: "➕", type: "math"},
            {id: 9, name: "Abyu Reaction Test", emoji: "⚡", type: "reaction"},
            {id: 10, name: "Abyu Rock Paper", emoji: "✂️", type: "rps"},
            {id: 11, name: "Abyu Flappy Bird", emoji: "🐦", type: "flappy"},
            {id: 12, name: "Abyu Breakout", emoji: "🧱", type: "breakout"}
        ];

        const grid = document.getElementById('gamesList');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<div class="game-emoji">${game.emoji}</div><div class="game-name">${game.name}</div>`;
            card.onclick = () => openGame(game.type);
            grid.appendChild(card);
        });

        let gameInterval = null;
        let snake, food, dx, dy, score, canvas, ctx;
        const gridSize = 20;

        function openGame(type) {
            closeGame();
            document.getElementById('gameModal').classList.add('active');
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';
            if(type === 'snake') loadSnakeGame(container);
            else if(type === 'tictactoe') loadTicTacToe(container);
            else if(type === 'clicker') loadClickerGame(container);
            else if(type === 'memory') loadMemoryGame(container);
            else if(type === 'guess') loadGuessGame(container);
            else if(type === 'dodge') loadDodgeGame(container);
            else if(type === 'color') loadColorGame(container);
            else if(type === 'math') loadMathGame(container);
            else if(type === 'reaction') loadReactionGame(container);
            else if(type === 'rps') loadRPSGame(container);
            else if(type === 'flappy') loadFlappyGame(container);
            else if(type === 'breakout') loadBreakoutGame(container);
        }

        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            if(gameInterval) { clearInterval(gameInterval); gameInterval = null; }
            document.onkeydown = null;
        }

        function loadSnakeGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;text-shadow: 0 0 10px #00ffff;">ABYU SNAKE</h2><div class="score">Score: <span id="snakeScore">0</span></div><canvas id="snakeCanvas" width="400" height="400"></canvas><div class="controls"><button class="btn" onclick="startSnake()">START</button></div>`;
        }
        
        function startSnake() {
            canvas = document.getElementById('snakeCanvas');
            ctx = canvas.getContext('2d');
            snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
            dx = gridSize; dy = 0; score = 0;
            document.getElementById('snakeScore').innerText = score;
            generateFood();
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateSnake, 100);
            document.onkeydown = changeDirection;
        }

        function updateSnake() {
            if (hasGameEnded()) { clearInterval(gameInterval); alert("Game Over! Score: " + score); return; }
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById('snakeScore').innerText = score;
                generateFood();
            } else { snake.pop(); }
            drawSnakeGame();
        }

        function drawSnakeGame() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff007f'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff007f';
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            ctx.fillStyle = '#00ff88'; ctx.shadowColor = '#00ff88';
            snake.forEach(part => { ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2); });
            ctx.shadowBlur = 0;
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize,
                y: Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize
            };
            snake.forEach(part => { if (part.x === food.x && part.y === food.y) generateFood(); });
        }

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize; const goingDown = dy === gridSize;
            const goingRight = dx === gridSize; const goingLeft = dx === -gridSize;
            if (keyPressed === 37 && !goingRight) { dx = -gridSize; dy = 0; }
            if (keyPressed === 38 && !goingDown) { dx = 0; dy = -gridSize; }
            if (keyPressed === 39 && !goingLeft) { dx = gridSize; dy = 0; }
            if (keyPressed === 40 && !goingUp) { dx = 0; dy = gridSize; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) { if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true; }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        function loadTicTacToe(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU TIC TAC TOE</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadClickerGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU CLICKER</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadMemoryGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU MEMORY</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadGuessGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU GUESS NUMBER</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadDodgeGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU DODGE CAR</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadColorGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU COLOR MATCH</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadMathGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU MATH QUIZ</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadReactionGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU REACTION TEST</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadRPSGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU ROCK PAPER</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadFlappyGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU FLAPPY BIRD</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
        
        function loadBreakoutGame(container) {
            container.innerHTML = `<h2 style="color:#00ffff;text-align:center;">ABYU BREAKOUT</h2><p style="text-align:center;margin-top:20px;">Coming Soon...</p>`;
        }
    </script>
</body>
