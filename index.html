    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* Neon Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, #ff00ff22 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, #00ffff22 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #ff008022 0%, transparent 50%);
            z-index: -1;
        }
        
        /* Header Neon Banner */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 3px solid #00ff88;
            box-shadow: 0 0 30px #00ff8855;
        }
        
        .logo {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #00ff88aa;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #00ff88); }
            to { filter: drop-shadow(0 0 25px #00ffff); }
        }
        
        .tagline {
            color: #00ffff;
            font-size: 1.2rem;
            margin-top: 10px;
            text-shadow: 0 0 10px #00ffff88;
        }
        
        /* Ad Banner Space */
        .ad-banner {
            background: linear-gradient(90deg, #ff0080, #ff8c00);
            text-align: center;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 0 20px #ff008055;
        }
        
        /* Games Grid */
        .games-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-title {
            font-size: 2rem;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff88;
            margin: 30px 0 20px 10px;
            border-left: 5px solid #00ff88;
            padding-left: 15px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .game-card {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1e);
            border: 2px solid #00ff8833;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px #00000088;
        }
        
        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #00ff88;
            box-shadow: 0 0 30px #00ff8866, 0 10px 30px #000;
        }
        
        .game-thumb {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .game-name {
            padding: 15px;
            text-align: center;
            font-weight: 700;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff66;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            background: #0f0f1e;
            border-top: 2px solid #ff00ff;
            color: #888;
            margin-top: 50px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        }
    </style>
</head>
